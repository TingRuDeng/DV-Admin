name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --no-tags --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          package-manager-cache: false
      - name: Validate docs
        run: python3 scripts/validate_docs.py . --profile generic
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run quality checks
        working-directory: frontend
        run: pnpm run quality
      - name: Run build
        working-directory: frontend
        run: pnpm run build
      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E smoke tests
        working-directory: frontend
        run: pnpm run test:e2e:smoke

  backend:
    name: Django Backend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --no-tags --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
      - name: Use Python 3.11 from runner toolcache
        run: |
          PY_DIR=$(find /opt/hostedtoolcache/Python -maxdepth 1 -type d -name '3.11.*' | sort -V | tail -n 1)
          test -n "$PY_DIR"
          echo "$PY_DIR/x64/bin" >> "$GITHUB_PATH"
          "$PY_DIR/x64/bin/python" --version
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev
      - name: Create .env.test
        working-directory: backend
        run: |
          echo "SECRET_KEY=test-secret-key" > .env.test
          echo "DEBUG=False" >> .env.test
          echo "ALLOWED_HOSTS=127.0.0.1,localhost,testserver" >> .env.test
          echo "DATABASE_URL=sqlite:///./test.sqlite3" >> .env.test
          echo "CORS_ALLOWED_ORIGINS=http://localhost:9527,http://127.0.0.1:9527" >> .env.test
          echo "EXTRA_INSTALLED_APPS=" >> .env.test
      - name: Run lint
        working-directory: backend
        run: .venv/bin/ruff check .
      - name: Run tests
        working-directory: backend
        run: .venv/bin/pytest

  fastapi:
    name: FastAPI Backend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --no-tags --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
      - name: Use Python 3.10 from runner toolcache
        run: |
          PY_DIR=$(find /opt/hostedtoolcache/Python -maxdepth 1 -type d -name '3.10.*' | sort -V | tail -n 1)
          test -n "$PY_DIR"
          echo "$PY_DIR/x64/bin" >> "$GITHUB_PATH"
          "$PY_DIR/x64/bin/python" --version
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        working-directory: fastapi
        run: uv sync --group dev
      - name: Create .env
        working-directory: fastapi
        run: |
          cp .env.example .env
          echo "SECRET_KEY=test-secret-key" >> .env
          echo "APP_ENV=test" >> .env
      - name: Run quality gate
        working-directory: fastapi
        run: |
          .venv/bin/ruff check . --ignore I
          .venv/bin/isort . --check-only
          .venv/bin/mypy app/schemas
          .venv/bin/pytest --cov=app --cov-report=term-missing --cov-fail-under=80
