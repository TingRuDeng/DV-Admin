name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run quality checks
        working-directory: frontend
        run: pnpm run quality
      - name: Run build
        working-directory: frontend
        run: pnpm run build

  backend:
    name: Django Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev
      - name: Create .env.test
        working-directory: backend
        run: |
          echo "SECRET_KEY=test-secret-key" > .env.test
          echo "DEBUG=False" >> .env.test
          echo "ALLOWED_HOSTS=127.0.0.1,localhost,testserver" >> .env.test
          echo "DATABASE_URL=sqlite:///./test.sqlite3" >> .env.test
          echo "CORS_ALLOWED_ORIGINS=http://localhost:9527,http://127.0.0.1:9527" >> .env.test
          echo "EXTRA_INSTALLED_APPS=" >> .env.test
      - name: Run lint
        working-directory: backend
        run: uv run ruff check .
      - name: Run tests
        working-directory: backend
        run: uv run pytest

  fastapi:
    name: FastAPI Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.10
      - name: Install dependencies
        working-directory: fastapi
        run: uv sync --group dev
      - name: Create .env
        working-directory: fastapi
        run: |
          cp .env.example .env
          echo "SECRET_KEY=test-secret-key" >> .env
          echo "APP_ENV=test" >> .env
      - name: Run quality gate
        working-directory: fastapi
        run: make quality
